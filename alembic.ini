# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = app/db/migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, defaults to 'utc'
timezone = UTC

# max length of characters to apply to the
# migration file template
# truncate_slug_length = 40

# set to 'true' to run the environment file as a
# standalone script, false to exec() it
# standalone_mode = false

# enable logging of the SQL generated by Alembic
# logging of SQL can be enabled by setting this to 'debug'
# but this can get extremely verbose, so it's recommended
# to only use it for debugging purposes
# logging_level = INFO

# set to 'true' to run the migration scripts in a transaction
# this can be useful for databases that support transactions
# for DDL operations
transaction_per_migration = true

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic
qualname =

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# Database URL
sqlalchemy.url = postgresql://finops:finops@localhost:5432/finops